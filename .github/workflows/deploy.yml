name: API Optimizer AI CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Backend Test & Verification Job
  backend-test:
    name: 🐍 FastAPI Backend Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx

    - name: Run Backend Test Suite
      env:
        PYTHONPATH: .
      run: |
        python scratch/test_sprint8.py

  # 2. Frontend Build Verification Job
  frontend-build:
    name: ⚛️ React Frontend Build Verification
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Install React Dependencies & Build
      env:
        CI: "false"
        DISABLE_ESLINT_PLUGIN: "true"
      run: |
        cd frontend
        npm ci --legacy-peer-deps || npm install --legacy-peer-deps
        DISABLE_ESLINT_PLUGIN=true CI=false npm run build

  # 3. Docker Compose Verification Job
  docker-build:
    name: 🐳 Docker Container Build Validation
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Validate Docker Compose Configuration
      run: |
        docker compose config
