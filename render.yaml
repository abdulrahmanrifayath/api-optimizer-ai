databases:
  - name: api-optimizer-ai-db
    databaseName: apioptimizer
    user: apioptimizer
    plan: free

services:
  - type: web
    name: api-optimizer-ai-backend
    env: python
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: api-optimizer-ai-db
          property: connectionString

  - type: web
    name: api-optimizer-ai-frontend
    env: python
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run frontend/dashboard.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: API_URL
        value: "https://api-optimizer-ai-backend.onrender.com"
