services:
  - type: web
    name: api-optimizer-ai-backend
    env: python
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONPATH
        value: "."
      - key: DATABASE_URL
        value: "sqlite:///./app.db"
      - key: CORS_ORIGINS
        value: "*"

  - type: web
    name: api-optimizer-ai-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install --legacy-peer-deps && DISABLE_ESLINT_PLUGIN=true npm run build"
    staticPublishPath: "build"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: REACT_APP_API_URL
        value: "https://api-optimizer-ai-backend.onrender.com"
