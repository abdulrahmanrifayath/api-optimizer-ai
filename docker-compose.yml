version: '3.8'

services:
  # MySQL 8.0 Database Container
  db:
    image: mysql:8.0
    container_name: api_optimizer_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: api_optimizer_db
      MYSQL_USER: api_user
      MYSQL_PASSWORD: api_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend Service
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: api_optimizer_backend
    restart: always
    environment:
      DATABASE_URL: mysql+pymysql://root:root@db:3306/api_optimizer_db
      JWT_SECRET: supersecretkey1234567890apioptimizerai
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      CORS_ORIGINS: "http://localhost,http://localhost:3000,http://127.0.0.1"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # React Frontend & Nginx Reverse Proxy
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: api_optimizer_frontend
    restart: always
    ports:
      - "80:80"
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
    driver: local
